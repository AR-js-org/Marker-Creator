<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marker Creator Example</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 900px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px #0001; }
        h1 { text-align: center; }
        #imageContainer img { width: 100%; max-width: 512px; border: 1px solid #ccc; }
        .mdl-grid { margin-top: 24px; }
        .mdl-cell { text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>Marker Creator Example</h1>
    <div class="mdl-grid">
        <div class="mdl-cell mdl-cell--4-col">
            <label id="buttonUpload" for="fileinput" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">
                <input type="file" id="fileinput" style="display: none">
                Upload
            </label>
            <div class="mdl-tooltip" for="buttonUpload">Upload the image to put inside the marker</div>
            <div style="justify-content: center" class="mdl-grid">
                <div class="mdl-cell mdl-cell--12-col">
                    <label class="mdl-js-ripple-effect" for="patternRatioSlider">
                        <span>Pattern Ratio 0.50</span>
                        <input id="patternRatioSlider" class="mdl-slider mdl-js-slider" type="range" min="10" max="90" value="50">
                    </label>
                    <div class="mdl-tooltip" for="patternRatioSlider">Set size of inner image vs black border</div>
                </div>
            </div>
            <div style="justify-content: center" class="mdl-grid">
                <div class="mdl-cell mdl-cell--12-col">
                    <label class="mdl-js-ripple-effect" for="imageSize">
                        <span>Image size 512px</span>
                        <input id="imageSize" class="mdl-slider mdl-js-slider" type="range" min="150" max="2500" value="512">
                    </label>
                    <div class="mdl-tooltip" for="imageSize">Set the pixel width/height of the image.</div>
                </div>
            </div>
            <div style="justify-content: center" class="mdl-grid">
                <div class="mdl-cell mdl-cell--12-col">
                    <label class="mdl-js-ripple-effect" for="borderColor">
                        <span>Border color. Please choose a dark one.</span>
                        <input id="borderColor" type="text" value="black">
                    </label>
                    <div class="mdl-tooltip" for="borderColor">Set the marker border color, using hexa code or color name.</div>
                </div>
            </div>
        </div>
        <div class="mdl-cell mdl-cell--4-col">
            <button id="buttonDownloadEncoded" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">Download Marker</button>
            <div class="mdl-tooltip" for="buttonDownloadEncoded">Download marker encoded from the uploaded image</div>
            <br/><br/>
            <button id="buttonDownloadFullImage" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">Download Image</button>
            <div class="mdl-tooltip" for="buttonDownloadFullImage">Download marker image</div>
        </div>
        <div class="mdl-cell mdl-cell--4-col">
            <div id="imageContainer"></div>
        </div>
    </div>
</div>
<script src="../../dist/marker-creator.umd.js"></script>
<script>
// Variabili globali
var innerImageURL = null;
var fullMarkerURL = null;
var imageName = null;

// Imposta immagine di default (opzionale)
// innerImageURL = 'inner-images/inner-arjs.png';
// updateFullMarkerImage();

// Gestione upload file
const fileInput = document.getElementById('fileinput');
if (fileInput) {
    fileInput.addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;
        imageName = file.name;
        imageName = imageName.substring(0, imageName.lastIndexOf('.')) || imageName;
        var reader = new FileReader();
        reader.onload = function(event) {
            innerImageURL = event.target.result;
            updateFullMarkerImage();
        };
        reader.readAsDataURL(file);
    });
}

// Gestione slider patternRatio
const patternRatioSlider = document.getElementById('patternRatioSlider');
if (patternRatioSlider) {
    patternRatioSlider.addEventListener('input', function() {
        var patternRatio = patternRatioSlider.value / 100;
        var domElement = document.querySelector('[for=patternRatioSlider] span');
        if (domElement) domElement.innerHTML = `Pattern Ratio ${patternRatio.toFixed(2)}`;
        updateFullMarkerImage();
    });
}

// Gestione slider imageSize
const imageSizeSlider = document.getElementById('imageSize');
if (imageSizeSlider) {
    imageSizeSlider.addEventListener('input', function() {
        var imageSize = imageSizeSlider.value;
        var domElement = document.querySelector('[for=imageSize] span');
        if (domElement) domElement.innerHTML = `Image size ${imageSize}px`;
        updateFullMarkerImage();
    });
}

// Gestione input colore bordo
const borderColorInput = document.getElementById('borderColor');
if (borderColorInput) {
    borderColorInput.addEventListener('input', function() {
        updateFullMarkerImage();
    });
}

// Download marker .patt
const buttonDownloadEncoded = document.getElementById('buttonDownloadEncoded');
if (buttonDownloadEncoded) {
    buttonDownloadEncoded.addEventListener('click', function() {
        if (!innerImageURL) {
            alert('Upload a file first');
            return;
        }
        window.MarkerCreator.ArPatternFile.encodeImageURL(innerImageURL, function(patternFileString) {
            window.MarkerCreator.ArPatternFile.triggerDownload(patternFileString, "pattern-" + (imageName || "marker") + ".patt");
        });
    });
}

// Download marker PNG
const buttonDownloadFullImage = document.getElementById('buttonDownloadFullImage');
if (buttonDownloadFullImage) {
    buttonDownloadFullImage.addEventListener('click', function() {
        if (!fullMarkerURL) {
            alert('Upload a file first');
            return;
        }
        var domElement = window.document.createElement('a');
        domElement.href = fullMarkerURL;
        domElement.download = "pattern-" + (imageName || 'marker') + '.png';
        document.body.appendChild(domElement);
        domElement.click();
        document.body.removeChild(domElement);
    });
}

// Funzione per aggiornare il marker
function updateFullMarkerImage() {
    if (!innerImageURL) return;
    var patternRatio = patternRatioSlider ? patternRatioSlider.value / 100 : 0.5;
    var imageSize = imageSizeSlider ? parseInt(imageSizeSlider.value) : 512;
    var borderColor = borderColorInput ? borderColorInput.value : 'black';
    // Validazione colore
    function hexaColor(color) {
        return /^#[0-9A-F]{6}$/i.test(color);
    }
    var s = new Option().style;
    s.color = borderColor;
    if (borderColor === '' || (s.color != borderColor && !hexaColor(borderColor))) {
        borderColor = 'black';
    }
    window.MarkerCreator.ArPatternFile.buildFullMarker(
        innerImageURL,
        patternRatio,
        imageSize,
        borderColor,
        function(markerUrl) {
            fullMarkerURL = markerUrl;
            var fullMarkerImage = document.createElement('img');
            fullMarkerImage.src = fullMarkerURL;
            var container = document.getElementById('imageContainer');
            if (container) {
                while (container.firstChild) container.removeChild(container.firstChild);
                container.appendChild(fullMarkerImage);
            }
        }
    );
}
</script>
</body>
</html>
