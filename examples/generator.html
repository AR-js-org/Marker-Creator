<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marker Creator Example</title>
  <script type="module" src="https://unpkg.com/@material/web/all.js?module"></script>
  <link rel="stylesheet" href="https://unpkg.com/@material/web/all.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <style>
    body { font-family: Arial, sans-serif; background: #eee; }
    h1 { text-align: center; font-size: 2.5rem; }
    .container { max-width: 1000px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px #0001; }
    #imageContainer img { width: 100%; max-width: 512px; border: 1px solid #ccc; }
    .grid { display: flex; flex-wrap: wrap; gap: 2rem; margin-top: 2rem; }
    .col { flex: 1 1 300px; min-width: 280px; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .actions { display: flex; flex-direction: column; gap: 1.5rem; align-items: center; }
    .slider-label { margin-bottom: 0.5rem; }
    .color-label { margin-bottom: 0.5rem; }
    md-dialog { --md-dialog-container-color: #fff; }

    /* Pulsanti arancioni stile AR.js originale */
    md-filled-button, md-filled-button::part(button) {
      --md-sys-color-primary: #ff9800;
      --md-sys-color-on-primary: #fff;
      background-color: #ff9800 !important;
      color: #fff !important;
    }
    md-filled-button:hover, md-filled-button:focus, md-filled-button[focused] {
      background-color: #e68900 !important;
      color: #fff !important;
    }

    md-filled-button, md-text-button, md-icon-button {
      --md-sys-color-primary: #1976d2; /* Original generator.html blue */
    }
    md-slider {
      --md-sys-color-primary: #1976d2; /* Same blue for sliders */
      --md-slider-active-track-color: #1976d2;
      --md-slider-handle-color: #1976d2;
      --md-slider-focus-handle-color: #1976d2;
      --md-slider-hover-handle-color: #1976d2;
      --md-slider-label-container-color: #1976d2;
    }

  </style>
  <script src="../../dist/marker-creator.umd.js"></script>
</head>
<body>
<div class="container">
  <h1>Marker Creator Example</h1>
  <div style="text-align:right; margin-bottom:1rem;">
    <md-icon-button id="show-info" aria-label="Info">
      <md-icon type="outlined">info</md-icon>
    </md-icon-button>
  </div>
  <md-dialog id="dialog-info">
    <div slot="headline">Welcome!</div>
    <div slot="content">
      Details on how to pick the inner image can be found
      <a target='_blank' href='https://kalwalt.github.io/artoolkit-docs/3_Marker_Training/marker_training.html'>here</a>
    </div>
    <div slot="actions">
      <md-text-button dialogAction="close">OK</md-text-button>
    </div>
  </md-dialog>
  <div class="grid">
    <div class="col">
      <input type="file" id="fileinput" style="display:none">
      <md-filled-button id="buttonUpload" title="Upload the image to put inside the marker">
        <md-icon type="outlined" slot="icon">file_upload</md-icon>
        <span>Upload</span>
      </md-filled-button>
      <div class="slider-label" id="patternRatioLabel">Pattern Ratio 0.50</div>
      <md-slider id="patternRatioSlider" min="10" max="90" value="50" step="1" labeled></md-slider>
      <div class="slider-label" id="imageSizeLabel">Image size 512px</div>
      <md-slider id="imageSize" min="150" max="2500" value="512" step="1" labeled></md-slider>
      <div class="color-label">Border color. Please choose a dark one.</div>
      <md-outlined-text-field id="borderColor" value="black" label="Border color"></md-outlined-text-field>
    </div>
    <div class="col actions">
      <md-filled-button id="buttonDownloadEncoded">Download Marker</md-filled-button>
      <md-filled-button id="buttonDownloadFullImage">Download Image</md-filled-button>
    </div>
    <div class="col">
      <div id="imageContainer"></div>
    </div>
  </div>
</div>
<script type="module">
// Global variables
let innerImageURL = null;
let fullMarkerURL = null;
let imageName = null;

// Info dialog
const dialog = document.getElementById('dialog-info');
document.getElementById('show-info').addEventListener('click', () => dialog.open = true);

// File upload
const fileInput = document.getElementById('fileinput');
const buttonUpload = document.getElementById('buttonUpload');
if (buttonUpload && fileInput) {
  buttonUpload.addEventListener('click', () => fileInput.click());
}
if (fileInput) {
  fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    imageName = file.name;
    imageName = imageName.substring(0, imageName.lastIndexOf('.')) || imageName;
    const reader = new FileReader();
    reader.onload = function(event) {
      innerImageURL = event.target.result;
      updateFullMarkerImage();
    };
    reader.readAsDataURL(file);
  });
}

// Pattern ratio slider
const patternRatioSlider = document.getElementById('patternRatioSlider');
patternRatioSlider.addEventListener('input', function() {
  const patternRatio = patternRatioSlider.value / 100;
  document.getElementById('patternRatioLabel').textContent = `Pattern Ratio ${patternRatio.toFixed(2)}`;
  updateFullMarkerImage();
});

// Image size slider
const imageSizeSlider = document.getElementById('imageSize');
imageSizeSlider.addEventListener('input', function() {
  const imageSize = imageSizeSlider.value;
  document.getElementById('imageSizeLabel').textContent = `Image size ${imageSize}px`;
  updateFullMarkerImage();
});

// Border color input
const borderColorInput = document.getElementById('borderColor');
borderColorInput.addEventListener('input', function() {
  updateFullMarkerImage();
});

// Download marker .patt
const buttonDownloadEncoded = document.getElementById('buttonDownloadEncoded');
buttonDownloadEncoded.addEventListener('click', function() {
  if (!innerImageURL) {
    alert('Upload a file first');
    return;
  }
  window.MarkerCreator.ArPatternFile.encodeImageURL(innerImageURL, function(patternFileString) {
    window.MarkerCreator.ArPatternFile.triggerDownload(patternFileString, "pattern-" + (imageName || "marker") + ".patt");
  });
});

// Download marker PNG
const buttonDownloadFullImage = document.getElementById('buttonDownloadFullImage');
buttonDownloadFullImage.addEventListener('click', function() {
  if (!fullMarkerURL) {
    alert('Upload a file first');
    return;
  }
  const domElement = window.document.createElement('a');
  domElement.href = fullMarkerURL;
  domElement.download = "pattern-" + (imageName || 'marker') + '.png';
  document.body.appendChild(domElement);
  domElement.click();
  document.body.removeChild(domElement);
});

// Function to update the marker
function updateFullMarkerImage() {
  if (!innerImageURL) return;
  const patternRatio = patternRatioSlider.value / 100;
  const imageSize = parseInt(imageSizeSlider.value);
  let borderColor = borderColorInput.value;
  function hexaColor(color) {
    return /^#[0-9A-F]{6}$/i.test(color);
  }
  const s = new Option().style;
  s.color = borderColor;
  if (borderColor === '' || (s.color != borderColor && !hexaColor(borderColor))) {
    borderColor = 'black';
  }
  window.MarkerCreator.ArPatternFile.buildFullMarker(
    innerImageURL,
    patternRatio,
    imageSize,
    borderColor,
    function(markerUrl) {
      fullMarkerURL = markerUrl;
      const fullMarkerImage = document.createElement('img');
      fullMarkerImage.src = fullMarkerURL;
      const container = document.getElementById('imageContainer');
      while (container.firstChild) container.removeChild(container.firstChild);
      container.appendChild(fullMarkerImage);
    }
  );
}
</script>
</body>
</html>
